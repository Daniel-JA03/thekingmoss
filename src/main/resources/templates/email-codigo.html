<div style="font-family: Arial, sans-serif; background-color: #0f1a3d; padding: 40px; color: #ffffff;">

    <div style="max-width: 500px; margin: auto; background-color: rgba(255,255,255,0.08); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);">

        <h2 style="text-align: center; color: #4caf50;">
            TheKingMoss
        </h2>

        <p style="text-align: center; color: #bfc9d4;">
            Recuperación de contraseña
        </p>

        <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

        <p style="text-align: center;">
            Tu código de verificación es:
        </p>

        <div style="text-align: center; margin: 25px 0;">
            <span style="
                display: inline-block;
                background: linear-gradient(135deg, #4caf50, #2ecc71);
                padding: 15px 25px;
                border-radius: 10px;
                font-size: 26px;
                letter-spacing: 5px;
                font-weight: bold;
                color: white;
            ">
                {{codigo}}
            </span>
        </div>

        <p style="text-align: center; color: #bfc9d4; font-size: 14px;">
            Este código expirará en 60 segundos.
        </p>

        <p style="text-align: center; color: #888; font-size: 12px; margin-top: 30px;">
            Si no solicitaste este código, puedes ignorar este mensaje.
        </p>

    </div>

</div>
